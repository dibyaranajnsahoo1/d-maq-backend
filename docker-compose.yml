services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dmaq-api
    ports:
      - '3000:3000'
    environment:
      - MONGO_URI=${DOCKER_MONGO_URI:-mongodb://mongo:27017/tasksdb}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-3600s}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=3000
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - dmaq-network

  mongo:
    image: mongo:6
    container_name: dmaq-mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - dmaq-network

  redis:
    image: redis:7-alpine
    container_name: dmaq-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - dmaq-network

volumes:
  mongo-data:

networks:
  dmaq-network:
    driver: bridge
